name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: create-theo/package-lock.json

      - name: Install dependencies
        working-directory: create-theo
        run: npm ci

      - name: Build
        working-directory: create-theo
        run: npm run build

      - name: Run tests
        working-directory: create-theo
        run: npm test

  validate-templates:
    name: Validate Templates
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: create-theo/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: create-theo
        run: npm ci

      - name: Validate all templates
        run: CI=true bash scripts/validate-templates.sh

  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: create-theo/package-lock.json

      - name: Install dependencies
        working-directory: create-theo
        run: npm ci

      - name: Audit dependencies
        working-directory: create-theo
        run: npm audit --audit-level=high
