name: Weekly Template Validation

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 9:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  validate:
    name: Validate All Templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: create-theo/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: create-theo
        run: npm install --no-fund --no-audit

      - name: Build
        working-directory: create-theo
        run: npm run build

      - name: Run tests
        working-directory: create-theo
        run: npm test

      - name: Validate all templates
        run: CI=true bash scripts/validate-templates.sh

      - name: Audit dependencies
        working-directory: create-theo
        run: npm audit --audit-level=high || true

      - name: Check template dependencies for vulnerabilities
        run: |
          echo "=== Checking template dependencies ==="
          for dir in templates/*/; do
            template=$(basename "$dir")
            if [ -f "$dir/package.json" ]; then
              echo "--- $template ---"
              cd "$dir"
              npm install --package-lock-only 2>/dev/null
              npm audit --audit-level=high 2>/dev/null || echo "WARN: $template has audit issues"
              rm -f package-lock.json
              cd - > /dev/null
            fi
          done
