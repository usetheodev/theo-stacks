name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: create-theo/package-lock.json

      - name: Sync version from tag
        working-directory: create-theo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        working-directory: create-theo
        run: npm install --no-fund --no-audit

      - name: Build
        working-directory: create-theo
        run: npm run build

      - name: Run tests
        working-directory: create-theo
        run: npm test

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "tag=${VERSION%%-*}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        working-directory: create-theo
        run: npm publish --access public --provenance --tag ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke-test:
    name: Post-publish Smoke Test
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Wait for npm propagation
        run: sleep 30

      - name: Scaffold and verify node-express
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx create-theo@${VERSION} smoke-express --template node-express
          cd smoke-express
          test -f theo.yaml
          test -f package.json
          test -f src/index.js
          grep -q '"smoke-express"' theo.yaml

      - name: Scaffold and verify go-api
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx create-theo@${VERSION} smoke-go --template go-api
          cd smoke-go
          test -f theo.yaml
          test -f main.go
          grep -q '"smoke-go"' theo.yaml

      - name: Scaffold and verify python-fastapi
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx create-theo@${VERSION} smoke-python --template python-fastapi
          cd smoke-python
          test -f theo.yaml
          test -f main.py
          grep -q '"smoke-python"' theo.yaml
