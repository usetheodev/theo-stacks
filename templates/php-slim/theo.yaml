version: 1
project: "{{project-name}}"

commands:
  dev: "composer start"
  build: "composer install --no-dev --optimize-autoloader"
  test: "./vendor/bin/phpunit tests/"
  lint: "composer lint"
  format: "composer cs"
  security: "composer audit"

apps:
  api:
    path: .
    framework: slim
    type: server
    port: 8000
